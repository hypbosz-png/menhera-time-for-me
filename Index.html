<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💔 Time Since...</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
        180deg,
        #1b1028,
        #2b163d,
        #0f0b18
    );

    color:white;
    font-family:"Malgun Gothic",sans-serif;
}

.rain{
    position:fixed;
    width:100%;
    height:100%;
    pointer-events:none;
}

.drop{
    position:absolute;
    width:2px;
    height:60px;

    background:
    linear-gradient(
        transparent,
        rgba(255,255,255,.7)
    );

    animation:fall linear infinite;
}

@keyframes fall{
    from{
        transform:translateY(-100px);
    }
    to{
        transform:translateY(110vh);
    }
}

.card{
    z-index:10;

    width:min(90%,600px);

    padding:40px;

    text-align:center;

    background:rgba(255,255,255,.05);

    backdrop-filter:blur(12px);

    border-radius:30px;

    border:1px solid rgba(255,255,255,.15);

    box-shadow:
    0 0 25px #ff6ec7,
    0 0 50px rgba(255,110,199,.4);
}

.heart{
    font-size:70px;
    animation:beat 1s infinite;
    margin-bottom:10px;
}

@keyframes beat{
    0%{transform:scale(1);}
    25%{transform:scale(1.15);}
    40%{transform:scale(1);}
    60%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

.title{
    font-size:1.8rem;
    margin-bottom:20px;

    text-shadow:
    0 0 10px #fff,
    0 0 20px #ff8cd9;
}

.timer{
    font-size:2rem;
    line-height:1.8;

    text-shadow:
    0 0 10px white,
    0 0 25px #ff8cd9;
}

.message{
    margin-top:20px;
    opacity:.85;
    font-size:1rem;
}

.loveCounter{
    margin-top:10px;
    font-size:1.8rem;

    text-shadow:
    0 0 10px white,
    0 0 20px #8fd3ff;
}

.bandage{
    position:absolute;
    font-size:2rem;
}

.bandage1{
    top:15px;
    left:15px;
    transform:rotate(-20deg);
}

.bandage2{
    bottom:15px;
    right:15px;
    transform:rotate(20deg);
}

.glitch{
    animation:glitch 4s infinite;
}

@keyframes glitch{
    0%,100%{
        transform:translateX(0);
    }
    2%{
        transform:translateX(-2px);
    }
    4%{
        transform:translateX(2px);
    }
    6%{
        transform:translateX(0);
    }
}

</style>
</head>

<body>

<div class="rain" id="rain"></div>

<div class="card glitch">

    <div class="bandage bandage1">💔</div>
    <div class="bandage bandage2">💕</div>

    <div class="heart">💔</div>

    <div class="title">
        2026.06.05
        5시 57분 이후...
    </div>

    <div class="timer" id="timer">
        계산 중...
    </div>

    <div class="message">
        🌙 시간이 계속 흘러가고 있어...
    </div>

    <div class="message" style="margin-top:30px;">
        💭 만약 우리가 계속 사귀었다면...
    </div>

    <div class="loveCounter" id="loveCounter">
        계산 중...
    </div>

</div>

<script>

const startDate =
new Date("2026-06-05T17:57:00");

const loveStartDate =
new Date("2025-06-21T00:00:00");

function updateTimer(){

    const now = new Date();
    const diff = now - startDate;

    if(diff < 0){
        document.getElementById("timer").innerHTML =
        "아직<br>그 날이 오지 않았어...";
        return;
    }

    const totalSeconds =
    Math.floor(diff/1000);

    const months =
    Math.floor(totalSeconds/(30*24*60*60));

    const days =
    Math.floor(
        (totalSeconds%(30*24*60*60))
        /(24*60*60)
    );

    const hours =
    Math.floor(
        (totalSeconds%(24*60*60))
        /3600
    );

    const minutes =
    Math.floor(
        (totalSeconds%3600)
        /60
    );

    const seconds =
    totalSeconds%60;

    let text="";

    if(months>0){
        text += `${months}개월 ${days}일<br>`;
    }else{
        text +=
        `${Math.floor(totalSeconds/(24*60*60))}일<br>`;
    }

    text +=
    `${hours}시간 ${minutes}분 ${seconds}초`;

    document.getElementById("timer").innerHTML =
    text;
}

function updateLoveCounter(){

    const now = new Date();

    const diff =
    now - loveStartDate;

    const days =
    Math.floor(
        diff/(1000*60*60*24)
    );

    document.getElementById("loveCounter").innerHTML =
    `${days}일`;
}

updateTimer();
updateLoveCounter();

setInterval(()=>{
    updateTimer();
    updateLoveCounter();
},100);

const rain =
document.getElementById("rain");

for(let i=0;i<100;i++){

    const drop =
    document.createElement("div");

    drop.classList.add("drop");

    drop.style.left =
    Math.random()*100+"vw";

    drop.style.animationDuration =
    (0.8+Math.random()*1.5)+"s";

    drop.style.opacity =
    Math.random();

    drop.style.animationDelay =
    Math.random()*2+"s";

    rain.appendChild(drop);
}

</script>

</body>
</html>
